name: Build & Release APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: JDK 17 설정
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Gradle 8.0 다운로드
        run: |
          curl -L -o /tmp/gradle.zip \
            https://services.gradle.org/distributions/gradle-8.0-bin.zip
          unzip -q /tmp/gradle.zip -d /opt/
          echo "/opt/gradle-8.0/bin" >> $GITHUB_PATH

      - name: Debug APK 빌드
        run: gradle assembleDebug --no-daemon

      - name: APK 이름에 날짜 추가
        run: |
          DATE=$(date +'%Y%m%d-%H%M')
          cp app/build/outputs/apk/debug/app-debug.apk \
             app/build/outputs/apk/debug/EbookReader-${DATE}.apk
          echo "APK_NAME=EbookReader-${DATE}.apk" >> $GITHUB_ENV
          echo "APK_PATH=app/build/outputs/apk/debug/EbookReader-${DATE}.apk" >> $GITHUB_ENV

      - name: APK 업로드
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_NAME }}
          path: ${{ env.APK_PATH }}
          retention-days: 30

      - name: GitHub Release 생성
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "전자책 보조 리더 v${{ github.run_number }}"
          files: ${{ env.APK_PATH }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
