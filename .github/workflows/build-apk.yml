name: Build & Release APK

on:
  push:
    branches:
      - claude/ocr-overlay-accessibility-app-wt01bx
      - main
  workflow_dispatch:   # 수동 실행 버튼

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: JDK 17 설정
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Gradle Wrapper 생성
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.0'

      - name: gradlew 실행 권한 부여
        run: chmod +x gradlew 2>/dev/null || gradle wrapper --gradle-version 8.0

      - name: Gradle 캐시
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Debug APK 빌드
        run: gradle assembleDebug --no-daemon

      - name: APK 이름에 날짜 추가
        run: |
          DATE=$(date +'%Y%m%d-%H%M')
          cp app/build/outputs/apk/debug/app-debug.apk \
             app/build/outputs/apk/debug/EbookReader-${DATE}.apk
          echo "APK_NAME=EbookReader-${DATE}.apk" >> $GITHUB_ENV
          echo "APK_PATH=app/build/outputs/apk/debug/EbookReader-${DATE}.apk" >> $GITHUB_ENV

      - name: APK를 Actions Artifact로 업로드
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_NAME }}
          path: ${{ env.APK_PATH }}
          retention-days: 30

      - name: GitHub Release 생성 및 APK 첨부
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "전자책 보조 리더 v${{ github.run_number }}"
          body: |
            ## 전자책 보조 리더 - 시각장애인용 AI 독서 보조앱

            ### 설치 방법
            1. 아래 **Assets**에서 `EbookReader-*.apk` 다운로드
            2. 안드로이드 설정 → 보안 → **출처를 알 수 없는 앱 허용**
            3. 다운받은 APK 파일 열어서 설치
            4. 앱 실행 후 권한 허용 (오버레이, 마이크)
            5. 설정 화면에서 **Claude API 키** 입력

            ### 지원 앱
            - YES24 ebook
            - 알라딘 ebook
            - 교보문고 ebook

            ### 음성 명령어
            | 명령 | 동작 |
            |------|------|
            | "읽어줘" | 현재 화면 OCR 후 읽기 |
            | "멈춰" | 읽기 중지 |
            | "검색해줘" | 음성으로 책 검색 |
            | "질문" | AI에게 내용 질문 |
            | "요약" | 현재 페이지 AI 요약 |
            | "빠르게 / 천천히" | 읽기 속도 조절 |

            > ⚠️ Android 8.0 (API 26) 이상 필요
          files: ${{ env.APK_PATH }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
